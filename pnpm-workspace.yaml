packages:
  - frontend
  - backend

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@tensorflow/tfjs-node': true
  canvas: true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  # SvelteKit stack — allow immediate installs when patch releases land (lockfile pins e.g. 2.61.1)
  - '@sveltejs/kit'
  - '@sveltejs/adapter-node'
  - '@sveltejs/vite-plugin-svelte'
  # Supply-chain policy bypass list uses package names (not name@version).
  # Keep package-level entries for frequently republished SDKs that can
  # temporarily fail minimum release age checks during lockfile refreshes.
