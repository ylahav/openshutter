packages:
  - frontend
  - backend

allowBuilds:
  '@nestjs/core': set this to true or false
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@tensorflow/tfjs-node': true
  canvas: true
  core-js: true
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  # Entries below were flagged by `pnpm install --frozen-lockfile` on 2026-06-23
  # because their releases were <24h old. `minimumReleaseAge` in workspace yaml
  # was not honored by pnpm 11.8 here (only `minimumReleaseAgeExclude` is), so
  # the exclude list is the working knob. Re-add new versions when fresh dep
  # releases trip the policy again, or move this to .npmrc / a global config.
  - '@aws-sdk/client-s3@3.1075.0'
  - '@aws-sdk/s3-request-presigner@3.1075.0'
  - '@sveltejs/adapter-node@5.5.6'
  - '@sveltejs/kit@2.67.0'
  - '@testing-library/svelte@5.4.2'
  - '@typescript-eslint/eslint-plugin@8.62.0'
  - '@typescript-eslint/parser@8.62.0'
  - mongoose@9.7.2
  - '@aws-sdk/checksums@3.1000.8'
  - '@aws-sdk/core@3.974.23'
  - '@aws-sdk/credential-provider-env@3.972.49'
  - '@aws-sdk/credential-provider-http@3.972.51'
  - '@aws-sdk/credential-provider-ini@3.972.56'
  - '@aws-sdk/credential-provider-login@3.972.55'
  - '@aws-sdk/credential-provider-node@3.972.58'
  - '@aws-sdk/credential-provider-process@3.972.49'
  - '@aws-sdk/credential-provider-sso@3.972.55'
  - '@aws-sdk/credential-provider-web-identity@3.972.55'
  - '@aws-sdk/middleware-flexible-checksums@3.974.33'
  - '@aws-sdk/middleware-sdk-s3@3.972.54'
  - '@aws-sdk/nested-clients@3.997.23'
  - '@aws-sdk/token-providers@3.1074.0'
  - '@aws-sdk/xml-builder@3.972.31'
  - '@testing-library/svelte-core@1.1.3'
  - '@typescript-eslint/project-service@8.62.0'
  - '@typescript-eslint/scope-manager@8.62.0'
  - '@typescript-eslint/tsconfig-utils@8.62.0'
  - '@typescript-eslint/type-utils@8.62.0'
  - '@typescript-eslint/types@8.62.0'
  - '@typescript-eslint/typescript-estree@8.62.0'
  - '@typescript-eslint/utils@8.62.0'
  - '@typescript-eslint/visitor-keys@8.62.0'
  - eslint-plugin-svelte@3.20.0
